<header>
  <h1>Choose Your Character!</h1>
  <!--div class="announcement"><b>Read:</b>&nbsp;<u (click)="goToNotice()">An announcement from the developer</u></div-->
  <app-birthday-banner (selectCharacter)="selectedCharacter = $event"></app-birthday-banner>
  <app-activities></app-activities>
  <app-legend
    [showMoreCharacters]="!showingMainCharacters"
    (selectMood)="selectedMood = $event"
  ></app-legend>
  <app-roster-filter
    [filters]="filters"
    [searchTerm]="searchTerm"
    (filtersChange)="filters = $event"
    (searchChange)="onSearchChange($event)"
  ></app-roster-filter>

  <div class="button-container">
    <button (click)="goToStats()" class="show-stats-btn">📊 Show Stats</button>
    <button (click)="selectRandomCharacter(true)" style="background-color: #FF4C4C;">⚔️ Random Character (RP Friendly)</button>
    <button (click)="selectRandomCharacter(false)">🎲 Random Character (All)</button>
  </div>
</header>
<app-character-grid
  [filters]="filters"
  [searchTerm]="searchTerm"
  [sortBy]="sortBy"
  [sortDirection]="sortDirection"
  (selectCharacter)="selectedCharacter = $event"
></app-character-grid>
<app-character-modal
  *ngIf="selectedCharacter"
  [character]="selectedCharacter"
  (close)="selectedCharacter = null"
></app-character-modal>
<app-mood-modal
  *ngIf="selectedMood"
  [mood]="selectedMood"
  [showInactive]="filters.inactive"
  [showRetired]="filters.retired"
  (close)="selectedMood = null"
  (selectCharacter)="selectedCharacter = $event"
></app-mood-modal>
<app-footer-buttons></app-footer-buttons>
