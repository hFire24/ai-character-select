<header>
  <h1>Choose Your Character!</h1>
  <app-birthday-banner (selectCharacter)="selectedCharacter = $event"></app-birthday-banner>
  <app-activities></app-activities>
  <app-legend [showMoreCharacters]="!showingMainCharacters" (selectMood)="selectedMood = $event"></app-legend>
  <app-search-bar (searchChange)="onSearchChange($event)"></app-search-bar>
  
  <div class="filter-section">
    <div class="filter-label">Show Characters:</div>
    <div class="filter-chips">
      <button 
        class="filter-chip"
        [class.active]="filters.active"
        [disabled]="searchTerm.trim().length > 0"
        (click)="toggleFilter('active')"
      >
        ✓ Active
      </button>
      <button 
        class="filter-chip"
        [class.active]="filters.inactive"
        [disabled]="searchTerm.trim().length > 0"
        (click)="toggleFilter('inactive')"
      >
        ⏸ Inactive
      </button>
      <button 
        class="filter-chip"
        [class.active]="filters.retired"
        [disabled]="searchTerm.trim().length > 0"
        (click)="toggleFilter('retired')"
      >
        🌇 Retired
      </button>
      <button 
        class="filter-chip"
        [class.active]="filters.side"
        [disabled]="searchTerm.trim().length > 0"
        (click)="toggleFilter('side')"
      >
        👥 Side
      </button>
    </div>
    @if (searchTerm.trim().length > 0) {
      <div class="filter-note">Filters disabled during search</div>
    }
  </div>

  <div class="sort-section">
    <div class="sort-label">Sort By:</div>
    <div class="sort-buttons">
      <button 
        class="sort-btn"
        [class.active]="sortBy === 'status'"
        (click)="setSortBy('status')"
      >
        Status {{ sortBy === 'status' ? (sortDirection === 'asc' ? '↑' : '↓') : '' }}
      </button>
      <button 
        class="sort-btn"
        [class.active]="sortBy === 'id'"
        (click)="setSortBy('id')"
      >
        ID {{ sortBy === 'id' ? (sortDirection === 'asc' ? '↑' : '↓') : '' }}
      </button>
      <button 
        class="sort-btn"
        [class.active]="sortBy === 'name'"
        (click)="setSortBy('name')"
      >
        Name {{ sortBy === 'name' ? (sortDirection === 'asc' ? '↑' : '↓') : '' }}
      </button>
      <button 
        class="sort-btn"
        [class.active]="sortBy === 'tier'"
        (click)="setSortBy('tier')"
      >
        Tier {{ sortBy === 'tier' ? (sortDirection === 'asc' ? '↑' : '↓') : '' }}
      </button>
      <button 
        class="clear-sort-btn"
        (click)="clearSort()"
        [disabled]="sortBy === 'none'"
      >
        ✕ Clear Sort
      </button>
    </div>
  </div>
  
  <div class="button-container">
    @if (showingMainCharacters) {
      <button 
        (click)="goToStats()" 
        class="show-stats-btn"
      >
        📊 Show Stats
      </button>
    }
  </div>
</header>
<app-character-grid 
  [filters]="filters" 
  [searchTerm]="searchTerm" 
  [sortBy]="sortBy"
  [sortDirection]="sortDirection"
  (selectCharacter)="selectedCharacter = $event"
></app-character-grid>
<app-character-modal *ngIf="selectedCharacter" [character]="selectedCharacter" (close)="selectedCharacter = null"></app-character-modal>
<app-mood-modal *ngIf="selectedMood" [mood]="selectedMood" [showInactive]="filters.inactive" [showRetired]="filters.retired" (close)="selectedMood = null" (selectCharacter)="selectedCharacter = $event"></app-mood-modal>
<app-footer-buttons></app-footer-buttons>
